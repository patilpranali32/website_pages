<!DOCTYPE html>
<html>
<head>
    <title>LoGIN</title>
    <style>
        body{
            margin: 10px;
            padding: 20px;

            justify-content: center;
        }
        div{
            height:400px;
            width:400px;
            border :5px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin: 30px;
            padding: 20px;

</head>
<body>
    <div>

                </tr>

                    <td style="padding: 10px;">Phone Number:</td>
                    <td style="padding: 10px;"><input type="number" name="mobile" maxlength="10"></td>
                </tr>
                <tr>
                    <td style="padding: 10px;"> Password:</td>
                    <td style="padding: 10px;"><input type="password" name="password"></td>
                </tr>
                <tr>
                    <td style="padding: 10px;"></td>
                    <td style="padding: 10px;"></td>
                </tr>
                <tr>
                    <td style="padding: 10px;" align="center"><input type="submit"></td>
                    <td style="padding: 10px;" align="center"><input type="reset"></td>
                </tr>
            </table>
            <br/>
            
            Already have an account?
             <a href="login.html">Login</a>
        </form>

    </div>
</body>
</html>
